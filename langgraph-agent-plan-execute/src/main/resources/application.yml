server:
  port: 8081

spring:
  application:
    name: plan-execute-agent

  # H2 数据库配置
  datasource:
    url: jdbc:h2:mem:planexecute;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # H2 控制台
  h2:
    console:
      enabled: true
      path: /h2-console

  # Jackson 配置
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# Plan-Execute 配置
plan-execute:
  max-replan-attempts: 3
  default-model: gemma4:e4b

# 日志配置
logging:
  level:
    com.zj.ai.langgraph4j: DEBUG
    org.bsc.langgraph4j: DEBUG
