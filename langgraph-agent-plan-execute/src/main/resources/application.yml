server:
  port: 8081

spring:
  application:
    name: plan-execute-agent

  # 数据源配置 - MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/plan_execute_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: woshiroot123456

  # JPA 配置（如果还需要使用 JPA）
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # Jackson 配置
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# MyBatis Plus 配置
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类扫描路径
  type-aliases-package: com.zj.ai.langgraph4j.domain.entity
  # 配置
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 日志输出
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  # 全局配置
  global-config:
    db-config:
      # 主键策略
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Plan-Execute 配置
plan-execute:
  max-replan-attempts: 3
  default-model: gemma4:e4b

# 日志配置
logging:
  level:
    com.zj.ai.langgraph4j: DEBUG
    org.bsc.langgraph4j: DEBUG
